name: MarketplaceApp
options:
  bundleIdPrefix: com.aakruthi
  deploymentTarget:
    iOS: "17.0"

packages:
  FirebaseiOS:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 10.29.0

targets:
  MarketplaceApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: ViewModels
      - path: Views
    resources:
      - path: GoogleService-Info.plist
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Marketplace
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.company.marketplace
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: FirebaseiOS
        product: FirebaseAuth
      - package: FirebaseiOS
        product: FirebaseFirestore
      - package: FirebaseiOS
        product: FirebaseStorage
