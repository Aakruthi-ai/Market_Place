name: Build and Test iOS App

on: [push]

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Decode Firebase config from secret
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > GoogleService-Info.plist

      - name: Generate Xcode project
        run: |
          xcodegen generate
          echo "----- xcodegen finished, checking output -----"
          ls -la

      - name: Verify project file exists
        run: |
          if [ -d "MarketplaceApp.xcodeproj" ]; then
            echo "SUCCESS: MarketplaceApp.xcodeproj was created."
            ls -la MarketplaceApp.xcodeproj
          else
            echo "FAILURE: MarketplaceApp.xcodeproj was NOT created."
            pwd
            ls -la
            echo "Contents of project.yml:"
            cat project.yml
            exit 1
          fi

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Resolve Swift package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MarketplaceApp.xcodeproj \
            -scheme MarketplaceApp

      - name: Build for Simulator
        run: |
          xcodebuild -project MarketplaceApp.xcodeproj \
            -scheme MarketplaceApp \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build
